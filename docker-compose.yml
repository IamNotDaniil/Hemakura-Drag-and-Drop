version: '3.9'
services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - '3000:3000'
    depends_on:
      - backend

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
    environment:
      PORT: 4000
      DATABASE_URL: postgres://hemakura:hemakura@db:5432/hemakura
      AUTH_SECRET: hemakura-dev-secret
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hemakura
      POSTGRES_USER: hemakura
      POSTGRES_PASSWORD: hemakura
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres-data:
